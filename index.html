  draw(ctx) {
    const fl = this.iframes > 0 && Math.floor(this.iframes / 2) % 2 === 0;
    ctx.fillStyle = fl ? PALETTE[15] : PALETTE[10]; // blood red
    ctx.fillRect(Math.round(this.x), Math.round(this.y), 24, 24);
    ctx.fillStyle = PALETTE[0];
    ctx.fillRect(Math.round(this.x + 3),  Math.round(this.y + 5), 4, 3);
    ctx.fillRect(Math.round(this.x + 17), Math.round(this.y + 5), 4, 3);
    ctx.fillStyle = PALETTE[11]; // orange eyes
    ctx.fillRect(Math.round(this.x + 4),  Math.round(this.y + 6), 2, 1);
    ctx.fillRect(Math.round(this.x + 18), Math.round(this.y + 6), 2, 1);
  }
}

// --- Particle ---
class Particle {
  constructor(x, y, vx, vy, color, life) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.color = color; this.life = life; this.maxLife = life; this.alive = true;
  }
  update(dt) {
    this.x += this.vx * dt; this.y += this.vy * dt;
    this.vy += 80 * dt; // gravity
    this.life -= dt;
    if (this.life <= 0) this.alive = false;
  }
  draw(ctx) {
    ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
    ctx.fillStyle   = this.color;
    ctx.fillRect(Math.round(this.x), Math.round(this.y), 2, 2);
    ctx.globalAlpha = 1;
  }
}

function spawnHitSparks(x, y) {
  const n = 4 + Math.floor(Math.random() * 3);
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = 30 + Math.random() * 60;
    particles.push(new Particle(x, y, Math.cos(a)*s, Math.sin(a)*s, PALETTE[15], 0.2));
  }
}

function spawnDeathBurst(x, y) {
  const n = 12 + Math.floor(Math.random() * 5);
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = 40 + Math.random() * 80;
    const c = PALETTE[10 + Math.floor(Math.random() * 3)]; // red/orange/yellow
    particles.push(new Particle(x, y, Math.cos(a)*s, Math.sin(a)*s, c, 0.5));
  }
}

function spawnDust(x, y) {
  const n = 2 + Math.floor(Math.random() * 2);
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = 15 + Math.random() * 25;
    particles.push(new Particle(x, y, Math.cos(a)*s, Math.sin(a)*s, PALETTE[4], 0.15));
  }
}

// ===== 7. ROOM MANAGER =====

const RoomManager = {
  current: null,

  load(id) {
    this.current = ROOMS[id];
  },

  // Base walls + red barrier rects when exits are locked.
  activeWalls() {
    const r  = this.current;
    const aw = [...r.walls];
    if (r.lockExitsUntilCleared && !r.cleared) {
      const DS = DOOR_SIZE;
      if (r.exits.n) aw.push({ x: W/2 - DS/2, y: 0,      w: DS, h: BW,  barrier: true });
      if (r.exits.s) aw.push({ x: W/2 - DS/2, y: H - BW, w: DS, h: BW,  barrier: true });
      if (r.exits.e) aw.push({ x: W - BW,     y: H/2 - DS/2, w: BW, h: DS, barrier: true });
      if (r.exits.w) aw.push({ x: 0,          y: H/2 - DS/2, w: BW, h: DS, barrier: true });
    }
    return aw;
  },

  draw(ctx) {
    const r = this.current;
    if (!r) return;
    ctx.fillStyle = r.bgColor || PALETTE[0];
    ctx.fillRect(0, 0, W, H);
    for (const w of this.activeWalls()) {
      ctx.fillStyle = w.barrier ? PALETTE[10] : PALETTE[4];
      ctx.fillRect(w.x, w.y, w.w, w.h);
    }
    // Act 4: red emergency lighting overlay
    if (r.act === 4) {
      ctx.globalAlpha = 0.18 + Math.sin(Date.now() / 400) * 0.04;
      ctx.fillStyle   = PALETTE[10];
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
    }
  }
};

// ===== 8. GAME LOOP =====

// 100 ms black flash between rooms.
const Transition = {
  active: false, timer: 0,
  _room: null, _sx: 0, _sy: 0,

  start(roomId, sx, sy) {
    this.active = true;
    this.timer  = 0.1;
    this._room  = roomId;
    this._sx    = sx;
    this._sy    = sy;
  },

  update(dt) {
    if (!this.active) return;
    this.timer -= dt;
    if (this.timer <= 0) {
      this.active = false;
      const prevAct = RoomManager.current ? RoomManager.current.act : 0;
      RoomManager.load(this._room);
      spawnEnemies(RoomManager.current);
      spawnPickups(RoomManager.current);
      if (RoomManager.current.act !== prevAct) Sfx.startAmbient(RoomManager.current.act);
      player.x    = this._sx;
      player.y    = this._sy;
      bullets      = []; beams = []; grenadeList = [];
      spitterSpits = []; acidPuddles = [];
      shockwaves   = []; sweepBeams  = [];
      particles    = [];
    }
  }
};

let gameState   = STATE.MENU;
let player;
let bullets     = [];
let enemies     = [];
let livePickups = [];
let beams       = [];
let grenadeList = [];
let sporeClouds  = [];
let spitterSpits = [];
let escapeTimer   = 180;
let dyingTimer    = 0;
let deathCount    = 0;
let lives         = LIVES_INITIAL;
let gameStartTime = Date.now();

// Title-screen art (pulpy painted cover; rendered on the MENU state).
// Source data URL is COVER_DATA_URL near the top of section 2 — keeping the
// single-file constraint, no external title.png lookup.
const titleImg = new Image();
let titleImgLoaded = false;
titleImg.onload  = () => { titleImgLoaded = true; };
titleImg.onerror = () => { /* fall back to text-only title */ };
titleImg.src     = COVER_DATA_URL;

// Snapshot of every room's original spawn data. Captured once at boot, used
// to rehydrate ROOMS during a hard reset (after lives run out).
const ROOM_SNAPSHOT = {};
function snapshotRooms() {
  for (const id in ROOMS) {
    ROOM_SNAPSHOT[id] = {
      enemies: ROOMS[id].enemies.map(e => ({ ...e })),
      pickups: ROOMS[id].pickups.map(p => ({ ...p }))
    };
  }
}
function resetAllRooms() {
  for (const id in ROOMS) {
    const r = ROOMS[id];
    r.cleared = false;
    r.enemies = ROOM_SNAPSHOT[id].enemies.map(e => ({ ...e }));
    r.pickups = ROOM_SNAPSHOT[id].pickups.map(p => ({ ...p }));
  }
}
let particles     = [];
let hitShake      = 0;
let acidPuddles  = [];
let shockwaves   = [];
let sweepBeams   = [];
let pulsePillars = [];
let acc          = 0;
let lastTs      = 0;

function spawnPickups(room) {
  livePickups = room.pickups.map(p => new Pickup(p.type, p.x, p.y));
}

function spawnEnemies(room) {
  // Clear all transient entity arrays before populating the new room.
  enemies = []; sporeClouds = []; spitterSpits = []; acidPuddles = [];
  shockwaves = []; sweepBeams = []; pulsePillars = [];

  // Cleared rooms (during a soft-life run) stay empty: doors remain open and
  // no mobs are respawned on re-entry. A hard reset clears every room's
  // `cleared` flag via resetAllRooms() so spawns return.
  if (room.cleared) return;

  for (const e of room.enemies) {
    switch (e.type) {
      case 'grunt':         enemies.push(new Grunt(e.x, e.y));          break;
      case 'sergeant':      enemies.push(new Sergeant(e.x, e.y));       break;
      case 'twitchy':       enemies.push(new Twitchy(e.x, e.y));        break;
      case 'hayes_boss':    enemies.push(new GeneralHayes(e.x, e.y));   break;
      case 'hybrid':        enemies.push(new HybridSoldier(e.x, e.y));  break;
      case 'alien_grunt':   enemies.push(new AlienGrunt(e.x, e.y));     break;
      case 'spore_drone':   enemies.push(new SporeDrone(e.x, e.y));     break;
      case 'brood_mother': {
        const bm = new BroodMother(e.x, e.y);
        enemies.push(bm); bm._spawnNodes(); break;
      }
      case 'stalker':       enemies.push(new Stalker(e.x, e.y));        break;
      case 'spitter':       enemies.push(new Spitter(e.x, e.y));        break;
      case 'drifter':       enemies.push(new Drifter(e.x, e.y));        break;
      case 'core_guardian': enemies.push(new CoreGuardian(e.x, e.y));   break;
      case 'pulse_pillar':  pulsePillars.push(new PulsingPillar(e.x, e.y)); break;
      case 'swarmer':       enemies.push(new Swarmer(e.x, e.y));        break;
      case 'spawner':       enemies.push(new WaveSpawner(e.x, e.y));    break;
      case 'pursuer':       enemies.push(new Pursuer(e.x, e.y));        break;
    }
  }
}

function checkTransition(room) {
  if (Transition.active) return;
  if (room.lockExitsUntilCleared && !room.cleared) return;

  const DS = DOOR_SIZE;
  const px = player.x, py = player.y, pw = player.w, ph = player.h;
  const pcx = px + pw / 2, pcy = py + ph / 2;

  // Player just past the inner face of each border wall
  if (room.exits.e && px + pw >= W - BW + 1 && pcy >= H/2 - DS/2 && pcy <= H/2 + DS/2) {
    Transition.start(room.exits.e, BW + 16, H/2 - ph/2);
  } else if (room.exits.w && px <= BW - 1 && pcy >= H/2 - DS/2 && pcy <= H/2 + DS/2) {
    Transition.start(room.exits.w, W - BW - 16 - pw, H/2 - ph/2);
  } else if (room.exits.s && py + ph >= H - BW + 1 && pcx >= W/2 - DS/2 && pcx <= W/2 + DS/2) {
    Transition.start(room.exits.s, W/2 - pw/2, BW + 16);
  } else if (room.exits.n && py <= BW - 1 && pcx >= W/2 - DS/2 && pcx <= W/2 + DS/2) {
    Transition.start(room.exits.n, W/2 - pw/2, H - BW - 16 - ph);
  }
}

// Restart from a given room (full state reset).
function restartFrom(roomId) {
  player.hp = player.maxHp;
  player.weapons   = [{ name: 'PULSE', dmg: 1, rate: 4, speed: 240, ammo: Infinity, maxAmmo: Infinity }];
  player.weaponIdx = 0; player.fireCooldown = 0; player.grenades = 1;
  RoomManager.load(roomId);
  spawnEnemies(RoomManager.current); spawnPickups(RoomManager.current);
  player.x = W/2 - 4; player.y = H/2 - 4;
  bullets = []; beams = []; grenadeList = [];
  spitterSpits = []; acidPuddles = []; shockwaves = []; sweepBeams = [];
  particles = []; hitShake = 0;
  if (RoomManager.current.act === 4) escapeTimer = 180;
  Sfx.startAmbient(RoomManager.current.act);
  gameState = STATE.PLAYING;
}

// Soft respawn: player still has lives left. Reload the act's start room and
// restore HP, but leave room.cleared flags intact — previously cleared rooms
// stay open and empty (no mob respawn). Weapons persist; grenade count is
// topped up to at least 1 so the player isn't stranded weaponless.
function softRespawn() {
  player.hp = player.maxHp;
  player.fireCooldown = 0;
  if (player.grenades < 1) player.grenades = 1;
  const startId = ACT_START[RoomManager.current.act] || 'act1_r01';
  RoomManager.load(startId);
  spawnEnemies(RoomManager.current); spawnPickups(RoomManager.current);
  player.x = W/2 - 4; player.y = H/2 - 4;
  bullets = []; beams = []; grenadeList = [];
  spitterSpits = []; acidPuddles = []; shockwaves = []; sweepBeams = [];
  particles = []; hitShake = 0;
  if (RoomManager.current.act === 4) escapeTimer = 180;
  Sfx.startAmbient(RoomManager.current.act);
  gameState = STATE.PLAYING;
}

// Hard reset: lives exhausted. Restore every room to its original spawn list
// with doors locked, refill lives, and full restartFrom() (which also resets
// weapons + ammo back to the starting Pulse Rifle).
function hardReset(roomId) {
  resetAllRooms();
  lives = LIVES_INITIAL;
  restartFrom(roomId);
}

const ACT_START = { 1:'act1_r01', 2:'act2_r01', 3:'act3_r01', 4:'act4_r01' };

function update(dt) {
  // MANUAL → page nav + return
  if (gameState === STATE.MANUAL) {
    if (Input.consumePressed('ArrowRight') || Input.consumePressed('KeyD')) {
      manualPage = (manualPage + 1) % MANUAL.length;
    }
    if (Input.consumePressed('ArrowLeft') || Input.consumePressed('KeyA')) {
      manualPage = (manualPage - 1 + MANUAL.length) % MANUAL.length;
    }
    if (Input.consumePressed('KeyH') || Input.consumePressed('Escape')) {
      gameState = manualReturn;
    }
    return;
  }

  // MENU → H opens manual; any other key starts the game.
  if (gameState === STATE.MENU) {
    if (Input.consumePressed('KeyH')) {
      manualReturn = STATE.MENU; manualPage = 0;
      gameState = STATE.MANUAL;
      return;
    }
    if (Input._justDown.size > 0) {
      Input._justDown.clear();
      gameState = STATE.PLAYING;
      Sfx.startAmbient(1);
    }
    return;
  }

  // PAUSED → ESC resumes, H opens manual.
  if (gameState === STATE.PAUSED) {
    if (Input.consumePressed('Escape')) gameState = STATE.PLAYING;
    if (Input.consumePressed('KeyH')) {
      manualReturn = STATE.PAUSED; manualPage = 0;
      gameState = STATE.MANUAL;
    }
    return;
  }

  // WIN / LOSE / DYING input handling
  if (gameState === STATE.WIN || gameState === STATE.LOSE) {
    if (Input.consumePressed('KeyR')) {
      deathCount = 0; gameStartTime = Date.now();
      resetAllRooms(); lives = LIVES_INITIAL;
      restartFrom(gameState === STATE.WIN ? 'act1_r01' : ACT_START[RoomManager.current.act]);
    }
    return;
  }
  if (gameState === STATE.DYING) {
    dyingTimer -= dt;
    if (dyingTimer <= 0) {
      const startId = ACT_START[RoomManager.current.act] || 'act1_r01';
      if (lives > 0) softRespawn();
      else           hardReset(startId);
    }
    return;
  }

  // PLAYING: ESC pauses, H opens manual without losing place.
  if (Input.consumePressed('Escape')) { gameState = STATE.PAUSED; return; }
  if (Input.consumePressed('KeyH')) {
    manualReturn = STATE.PAUSED; manualPage = 0;
    gameState = STATE.MANUAL;
    return;
  }

  Transition.update(dt);
  if (Transition.active || gameState !== STATE.PLAYING) return;

  const room  = RoomManager.current;
  const walls = RoomManager.activeWalls();

  player.update(dt, walls, bullets);

  for (const e of enemies) {
    if (e.alive) e.update(dt, walls, player, bullets);
  }

  // Knockback (applied after normal movement so it's additive, not overridden)
  for (const e of enemies) {
    if (e.kbTimer > 0) {
      e.x += e.kbVx * dt; e.y += e.kbVy * dt;
      for (const w of walls) resolveAABB(e, w);
      e.kbVx *= 0.88; e.kbVy *= 0.88;
      e.kbTimer = Math.max(0, e.kbTimer - dt);
    }
  }

  for (const b of bullets) b.update(dt);
  for (const bm of beams)  bm.update(dt);
  for (const g of grenadeList) g.update(dt, walls);

  // Player bullets → enemies (pierce-aware; CoreGuardian uses limb hitboxes)
  for (const b of bullets) {
    if (!b.alive || b.owner !== 'player') continue;
    for (const e of enemies) {
      if (!e.alive || b.hitSet.has(e)) continue;
      if (e instanceof CoreGuardian && e.phase === 1) {
        if (overlaps(b, e) && e.processLimbHit(b)) { b.alive = false; break; }
      } else if (overlaps(b, e)) {
        b.hitSet.add(e);
        e.takeDamage(b.dmg);
        if (b.pierce > 0) { b.pierce--; }
        else { b.alive = false; break; }
      }
    }
  }

  // Enemy bullets → player
  for (const b of bullets) {
    if (!b.alive || b.owner !== 'enemy') continue;
    if (overlaps(b, player)) { b.alive = false; player.takeDamage(b.dmg); }
  }

  // Enemy contact → player
  for (const e of enemies) {
    if (e.alive && overlaps(e, player)) player.takeDamage(1);
  }

  // Pickups → player
  for (const p of livePickups) {
    if (p.alive && overlaps(p, player)) collectPickup(p);
  }

  bullets     = bullets.filter(b => b.alive);
  enemies     = enemies.filter(e => e.alive);
  beams       = beams.filter(b => b.alive);
  grenadeList = grenadeList.filter(g => g.alive);
  livePickups = livePickups.filter(p => p.alive);

  // Bullet-wall dust
  for (const b of bullets) {
    if (!b.alive) continue;
    for (const w of walls) {
      if (overlaps(b, w)) { b.alive = false; spawnDust(b.x, b.y); break; }
    }
  }

  // Particles + hit-shake decay
  for (const p of particles) p.update(dt);
  particles = particles.filter(p => p.alive);
  hitShake  = Math.max(0, hitShake - dt * 12);

  // Act 3 hazards
  for (const sc of sporeClouds)  sc.update(dt);
  for (const ss of spitterSpits) ss.update(dt);
  for (const ap of acidPuddles)  ap.update(dt);
  for (const sw of shockwaves)   sw.update(dt);
  for (const sb of sweepBeams)   sb.update(dt);
  for (const pp of pulsePillars) pp.update(dt);

  sporeClouds  = sporeClouds.filter(s => s.alive);
  spitterSpits = spitterSpits.filter(s => s.alive);
  acidPuddles  = acidPuddles.filter(a => a.alive);
  shockwaves   = shockwaves.filter(s => s.alive);
  sweepBeams   = sweepBeams.filter(s => s.alive);

  // Room cleared? (Pursuers excluded from count)
  const clearCount = enemies.filter(e => e.countsForClear !== false).length;
  if (!room.cleared && clearCount === 0) {
    room.cleared = true;
    if (room.lockExitsUntilCleared) Sfx.doorOpen();
  }

  // Player death — burn one life. The DYING handler decides soft vs hard
  // respawn based on whether any lives remain after this decrement.
  if (player.hp <= 0) {
    gameState  = STATE.DYING;
    dyingTimer = 1.5;
    deathCount++;
    lives--;
  }

  // Act 4 escape timer
  if (room.act === 4) {
    escapeTimer -= dt;
    if (escapeTimer <= 0) { escapeTimer = 0; gameState = STATE.LOSE; }
  }

  // Win condition: east edge of act4_r08
  if (room.id === 'act4_r08' && player.x + player.w >= W - BW - 4) {
    gameState = STATE.WIN;
  }

  checkTransition(room);
}

function render(ctx) {
  if (Transition.active) { ctx.fillStyle = PALETTE[0]; ctx.fillRect(0, 0, W, H); return; }

  if (gameState === STATE.DYING) {
    RoomManager.draw(ctx); player.draw(ctx);
    const f = dyingTimer / 1.5;
    ctx.globalAlpha = f > 0.8 ? (1 - f) * 5 : 1 - f / 0.8;
    ctx.fillStyle   = f > 0.8 ? PALETTE[10] : PALETTE[0];
    ctx.fillRect(0, 0, W, H); ctx.globalAlpha = 1;
    if (f < 0.5) {
      ctx.fillStyle = PALETTE[5]; ctx.font = '8px monospace'; ctx.textAlign = 'center';
      ctx.fillText('RESTARTING ACT ' + RoomManager.current.act, W/2, H/2);
      ctx.textAlign = 'left';
    }
    return;
  }

  if (gameState === STATE.MENU) {
    ctx.fillStyle = PALETTE[0]; ctx.fillRect(0, 0, W, H);
    if (titleImgLoaded) {
      // Square painted cover, fitted to canvas height (240) and centered.
      // Smoothing toggled briefly so the downsample doesn't get crunched by
      // the global pixel-art setting.
      const ih = H, iw = ih;
      ctx.imageSmoothingEnabled = true;
      ctx.drawImage(titleImg, Math.floor((W - iw) / 2), 0, iw, ih);
      ctx.imageSmoothingEnabled = false;
    } else {
      ctx.font = '8px monospace'; ctx.textAlign = 'center';
      ctx.fillStyle = PALETTE[12];
      ctx.fillText('H O S T F A L L', W/2, H/2 - 16);
      ctx.fillStyle = PALETTE[4];
      ctx.fillText('THE BASE HAS FALLEN', W/2, H/2 - 4);
    }
    ctx.font = '8px monospace'; ctx.textAlign = 'center';
    if (Math.floor(Date.now() / 600) % 2 === 0) {
      // Subtle drop-shadow keeps the text legible against the painted art.
      ctx.fillStyle = PALETTE[0];
      ctx.fillText('PRESS ANY KEY TO START', W/2 + 1, H - 21);
      ctx.fillStyle = PALETTE[15];
      ctx.fillText('PRESS ANY KEY TO START', W/2,     H - 22);
    }
    // Persistent manual hint.
    ctx.fillStyle = PALETTE[0];
    ctx.fillText('PRESS H FOR FIELD MANUAL', W/2 + 1, H - 9);
    ctx.fillStyle = PALETTE[12];
    ctx.fillText('PRESS H FOR FIELD MANUAL', W/2,     H - 10);
    ctx.textAlign = 'left'; return;
  }

  if (gameState === STATE.WIN) {
    ctx.fillStyle = PALETTE[0]; ctx.fillRect(0, 0, W, H);
    ctx.font = '8px monospace'; ctx.textAlign = 'center';
    ctx.fillStyle = PALETTE[12];
    ctx.fillText('EXTRACTION SUCCESSFUL', W/2, H/2 - 24);
    ctx.fillStyle = PALETTE[5];
    const elapsed = Math.round((Date.now() - gameStartTime) / 1000);
    const m = Math.floor(elapsed/60), s = elapsed%60;
    ctx.fillText('TIME  ' + m + ':' + String(s).padStart(2,'0'), W/2, H/2 - 8);
    ctx.fillText('DEATHS  ' + deathCount, W/2, H/2 + 6);
    ctx.fillStyle = PALETTE[4];
    ctx.fillText('PRESS R TO RESTART', W/2, H/2 + 22);
    ctx.textAlign = 'left'; return;
  }

  if (gameState === STATE.LOSE) {
    ctx.fillStyle = PALETTE[0]; ctx.fillRect(0, 0, W, H);
    ctx.font = '8px monospace'; ctx.textAlign = 'center';
    ctx.fillStyle = PALETTE[10]; ctx.fillText('TOO LATE', W/2, H/2 - 8);
    ctx.fillStyle = PALETTE[4]; ctx.fillText('PRESS R TO RESTART ACT', W/2, H/2 + 8);
    ctx.textAlign = 'left'; return;
  }

  if (gameState === STATE.MANUAL) { drawManual(ctx); return; }

  if (gameState === STATE.PAUSED) {
    // Render the world frozen behind a dim overlay so the player keeps context.
    RoomManager.draw(ctx);
    for (const ap of acidPuddles)  ap.draw(ctx);
    for (const sc of sporeClouds)  sc.draw(ctx);
    for (const pp of pulsePillars) pp.draw(ctx);
    for (const p  of livePickups)  p.draw(ctx);
    for (const e  of enemies)      e.draw(ctx);
    for (const g  of grenadeList)  g.draw(ctx);
    for (const b  of bullets)      b.draw(ctx);
    for (const bm of beams)        bm.draw(ctx);
    for (const ss of spitterSpits) ss.draw(ctx);
    for (const p  of particles)    p.draw(ctx);
    for (const sw of shockwaves)   sw.draw(ctx);
    for (const sb of sweepBeams)   sb.draw(ctx);
    player.draw(ctx);
    drawHUD(ctx);
    ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, W, H);
    ctx.font = '8px monospace'; ctx.textAlign = 'center';
    ctx.fillStyle = PALETTE[12]; ctx.fillText('PAUSED', W/2, H/2 - 8);
    ctx.fillStyle = PALETTE[5];
    ctx.fillText('ESC resume   H field manual', W/2, H/2 + 6);
    ctx.textAlign = 'left'; return;
  }

  RoomManager.draw(ctx);
  for (const ap of acidPuddles)  ap.draw(ctx);
  for (const sc of sporeClouds)  sc.draw(ctx);
  for (const pp of pulsePillars) pp.draw(ctx);
  for (const p of livePickups)   p.draw(ctx);
  for (const e of enemies)      e.draw(ctx);
  for (const g of grenadeList) g.draw(ctx);
  for (const b of bullets)     b.draw(ctx);
  for (const bm of beams)        bm.draw(ctx);
  for (const ss of spitterSpits) ss.draw(ctx);
  for (const p  of particles)     p.draw(ctx);
  for (const sw of shockwaves)   sw.draw(ctx);
  for (const sb of sweepBeams)   sb.draw(ctx);
  player.draw(ctx);
  drawHUD(ctx);
}

// Render one page of the in-game field manual at the canvas's native resolution.
// Lines starting with '$h' are headings (yellow), '$d' are dim notes (mid grey).
function drawManual(ctx) {
  const page = MANUAL[manualPage];
  ctx.fillStyle = PALETTE[1]; ctx.fillRect(0, 0, W, H);
  ctx.font = '8px monospace';

  // Header: title + page indicator
  ctx.textAlign = 'center';
  ctx.fillStyle = PALETTE[12];
  ctx.fillText('FIELD MANUAL  -  ' + page.title, W/2, 14);
  ctx.fillStyle = PALETTE[4];
  ctx.fillText('PAGE ' + (manualPage + 1) + '/' + MANUAL.length, W/2, 24);

  // Body: top-aligned, left-flushed, ~10px line-height keeps 22-row pages legible.
  ctx.textAlign = 'left';
  let y = 42;
  for (const raw of page.lines) {
    let line = raw, color = PALETTE[5];
    if      (raw.startsWith('$h')) { line = raw.slice(2); color = PALETTE[12]; }
    else if (raw.startsWith('$d')) { line = raw.slice(2); color = PALETTE[4];  }
    ctx.fillStyle = color;
    ctx.fillText(line, 12, y);
    y += 10;
  }

  // Footer hint (centered, dim)
  ctx.textAlign = 'center';
  ctx.fillStyle = PALETTE[4];
  ctx.fillText('< / >  page    ESC or H  back', W/2, H - 8);
  ctx.textAlign = 'left';
}

function loop(ts) {
  requestAnimationFrame(loop);
  acc   += Math.min((ts - lastTs) / 1000, 0.05); // cap spike at 50 ms
  lastTs = ts;
  while (acc >= DT) { update(DT); acc -= DT; }
  offCtx.clearRect(0, 0, W, H);
  render(offCtx);
  displayCtx.clearRect(0, 0, display.width, display.height);
  // Screen shake (hit + act 4 escape pressure)
  let shakeAmt = hitShake;
  if (RoomManager.current && RoomManager.current.act === 4 && gameState === STATE.PLAYING) {
    shakeAmt += escapeTimer < 30 ? 4 : escapeTimer < 90 ? 2 : 0;
  }
  const sx = shakeAmt ? (Math.random() - 0.5) * shakeAmt * 2 : 0;
  const sy = shakeAmt ? (Math.random() - 0.5) * shakeAmt * 2 : 0;
  displayCtx.drawImage(offscreen, Math.round(sx), Math.round(sy), display.width, display.height);
}

// ===== 9. UI / HUD =====

function drawHUD(ctx) {
  ctx.font = '8px monospace';

  // --- Health pips (top-left) ---
  // Active pip: blood-red filled square. Lost pip: dark navy outline.
  for (let i = 0; i < player.maxHp; i++) {
    if (i < player.hp) {
      ctx.fillStyle = PALETTE[10];
      ctx.fillRect(8 + i * 11, 6, 8, 8);
    } else {
      ctx.fillStyle = PALETTE[1];
      ctx.fillRect(8 + i * 11, 6, 8, 8);
      ctx.fillStyle = PALETTE[0];
      ctx.fillRect(9 + i * 11, 7, 6, 6); // hollow centre
    }
  }

  // --- Lives (yellow pips, just below the health row) ---
  // One pip per remaining life; absent slot rendered as hollow outline so
  // the counter reads at a glance.
  for (let i = 0; i < LIVES_INITIAL; i++) {
    const lx = 8 + i * 6, ly = 17;
    if (i < lives) {
      ctx.fillStyle = PALETTE[12];
      ctx.fillRect(lx, ly, 4, 4);
    } else {
      ctx.fillStyle = PALETTE[1];
      ctx.fillRect(lx, ly, 4, 4);
      ctx.fillStyle = PALETTE[0];
      ctx.fillRect(lx + 1, ly + 1, 2, 2);
    }
  }

  // --- Weapon name + ammo (top-right) ---
  const wep     = player.weapons[player.weaponIdx];
  const ammoStr = wep.ammo === Infinity ? '∞' : String(wep.ammo).padStart(3, ' ');
  ctx.fillStyle = PALETTE[5];
  ctx.textAlign = 'right';
  ctx.fillText(wep.name + '  ' + ammoStr, W - 8, 15);
  ctx.textAlign = 'left';

  // --- Grenade count (bottom-left) ---
  // Small orange square icon + count
  ctx.fillStyle = PALETTE[11];
  ctx.fillRect(8, H - 16, 6, 8);       // grenade icon
  ctx.fillStyle = PALETTE[5];
  ctx.fillText('×' + player.grenades, 17, H - 9);

  // --- Stamina bar (bottom-right, only when not full) ---
  if (player.sprinting || player.stamina < player.staminaMax) {
    const bW = 40, bH = 4;
    const bX = W - 8 - bW, bY = H - 10;
    ctx.fillStyle = PALETTE[0];
    ctx.fillRect(bX - 1, bY - 1, bW + 2, bH + 2);
    ctx.fillStyle = PALETTE[2];
    ctx.fillRect(bX, bY, bW, bH);
    ctx.fillStyle = player.sprinting ? PALETTE[12] : PALETTE[9];
    ctx.fillRect(bX, bY, Math.round(bW * player.stamina / player.staminaMax), bH);
  }

  // --- Act 4 escape timer (top-center) ---
  if (RoomManager.current && RoomManager.current.act === 4 && gameState === STATE.PLAYING) {
    const t   = Math.max(0, escapeTimer);
    const m   = Math.floor(t / 60), s = Math.floor(t % 60);
    const str = m + ':' + String(s).padStart(2, '0');
    ctx.fillStyle = t < 30 ? PALETTE[10] : t < 90 ? PALETTE[11] : PALETTE[5];
    ctx.textAlign = 'center';
    ctx.fillText(str, W / 2, 15);
    ctx.textAlign = 'left';
  }

  // --- Boss bar + dialogue (when a boss is present) ---
  const boss = enemies.find(e => e instanceof GeneralHayes || e instanceof BroodMother || e instanceof CoreGuardian);
  if (boss) {
    const bW = 140, bH = 7;
    const bX = W / 2 - bW / 2, bY = 20;
    let label, barColor;
    if (boss instanceof GeneralHayes) {
      label    = boss.phase === 1 ? 'GENERAL HAYES' : 'THE VESSEL';
      barColor = boss.phase === 1 ? PALETTE[10] : PALETTE[13];
    } else if (boss instanceof BroodMother) {
      label    = boss.vulnerable ? 'BROOD MOTHER  [VULNERABLE]' : 'BROOD MOTHER';
      barColor = boss.vulnerable ? PALETTE[10] : PALETTE[4];
    } else {
      label    = boss.phase === 1 ? 'CORE GUARDIAN' : 'ENRAGED GUARDIAN';
      barColor = boss.phase === 1 ? PALETTE[4] : PALETTE[10];
    }
    ctx.fillStyle = PALETTE[5];
    ctx.textAlign = 'center';
    ctx.fillText(label, W / 2, bY - 2);
    ctx.textAlign = 'left';
    ctx.fillStyle = PALETTE[1];
    ctx.fillRect(bX, bY, bW, bH);
    ctx.fillStyle = barColor;
    ctx.fillRect(bX, bY, Math.round(bW * Math.max(0, boss.hp) / boss.maxHp), bH);
    // Dialogue overlay
    if (boss.dialogueText && boss.dialogueTimer > 0) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(16, H / 2 - 10, W - 32, 18);
      ctx.fillStyle = PALETTE[5];
      ctx.textAlign = 'center';
      ctx.fillText('"' + boss.dialogueText + '"', W / 2, H / 2 + 4);
      ctx.textAlign = 'left';
    }
  }
}

// ===== 10. BOOTSTRAP =====

const display    = document.getElementById('display');
const displayCtx = display.getContext('2d');

const offscreen  = document.createElement('canvas');
offscreen.width  = W;
offscreen.height = H;
const offCtx = offscreen.getContext('2d');
offCtx.imageSmoothingEnabled = false;

function resize() {
  const s = Math.max(1, Math.min(
    Math.floor(window.innerWidth  / W),
    Math.floor(window.innerHeight / H)
  ));
  display.width  = W * s;
  display.height = H * s;
  displayCtx.imageSmoothingEnabled = false;
}

resize();
window.addEventListener('resize', resize);
Input.init();
snapshotRooms();
RoomManager.load('act1_r01');
spawnEnemies(RoomManager.current);
spawnPickups(RoomManager.current);
player = new Player(W / 2 - 4, H / 2 - 4);
requestAnimationFrame(ts => { lastTs = ts; requestAnimationFrame(loop); });

</script>
</body>
