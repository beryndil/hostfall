// ===== 1. CONSTANTS =====

const W  = 320;
const H  = 240;
const DT = 1 / 60;   // fixed timestep
const BW        = 8;  // border-wall thickness
const DOOR_SIZE = 32; // doorway opening width/height

// Lives system: each act-attempt grants this many lives. Soft death (lives
// remaining) keeps cleared rooms cleared and mobs dead. Hard death (no lives
// left) restores every room to its original spawn list with doors locked.
const LIVES_INITIAL = 3;

const PALETTE = [
  '#000000', // 0  black
  '#1a1a2e', // 1  deep navy
  '#16213e', // 2  dark blue
  '#3a2e1a', // 3  dark brown
  '#7a7a7a', // 4  grey concrete
  '#c8c8c8', // 5  light grey
  '#5a3a1a', // 6  brown
  '#8b6914', // 7  khaki
  '#2d5016', // 8  dark green
  '#7fb069', // 9  glow green
  '#d62828', // 10 blood red
  '#f77f00', // 11 orange
  '#fcbf49', // 12 yellow
  '#7209b7', // 13 purple
  '#f72585', // 14 magenta
  '#ffffff'  // 15 white
];

const STATE = {
  MENU:           'MENU',
  PLAYING:        'PLAYING',
  PAUSED:         'PAUSED',
  DYING:          'DYING',
  ACT_TRANSITION: 'ACT_TRANSITION',
  WIN:            'WIN',
  LOSE:           'LOSE',
  MANUAL:         'MANUAL'   // in-game field manual (controls / weapons / bestiary)
};

// Where to return when the player exits the manual.
let manualReturn = STATE.MENU;
let manualPage   = 0;

// ===== 2. SPRITE DATA =====

// Sprites are 2D arrays of palette indices; -1 = transparent.
// drawSprite renders each cell as (scale × scale) pixels.
const SPR = {};

function drawSprite(ctx, data, x, y, scale) {
  scale = scale || 1;
  for (let r = 0; r < data.length; r++) {
    for (let c = 0; c < data[r].length; c++) {
      const idx = data[r][c];
      if (idx < 0) continue;
      ctx.fillStyle = PALETTE[idx];
      ctx.fillRect(Math.round(x + c * scale), Math.round(y + r * scale), scale, scale);
    }
  }
}

// Build border walls with doorway gaps where exits exist.
// Doors are centred horizontally (N/S) or vertically (E/W).
function buildWalls(exits) {
  const DS = DOOR_SIZE;
  const w  = [];
  const hgap = [W / 2 - DS / 2, DS]; // [start, width] of horizontal gap
  const vgap = [H / 2 - DS / 2, DS]; // [start, height] of vertical gap

  // Top
  if (exits.n) {
    w.push({ x: 0,              y: 0,      w: hgap[0],             h: BW });
    w.push({ x: hgap[0] + DS,   y: 0,      w: W - hgap[0] - DS,    h: BW });
  } else { w.push({ x: 0, y: 0, w: W, h: BW }); }

  // Bottom
  if (exits.s) {
    w.push({ x: 0,              y: H - BW, w: hgap[0],             h: BW });
    w.push({ x: hgap[0] + DS,   y: H - BW, w: W - hgap[0] - DS,    h: BW });
  } else { w.push({ x: 0, y: H - BW, w: W, h: BW }); }

  // Left
  if (exits.w) {
    w.push({ x: 0, y: 0,              w: BW, h: vgap[0]          });
    w.push({ x: 0, y: vgap[0] + DS,   w: BW, h: H - vgap[0] - DS });
  } else { w.push({ x: 0, y: 0, w: BW, h: H }); }

  // Right
  if (exits.e) {
    w.push({ x: W - BW, y: 0,              w: BW, h: vgap[0]          });
    w.push({ x: W - BW, y: vgap[0] + DS,   w: BW, h: H - vgap[0] - DS });
  } else { w.push({ x: W - BW, y: 0, w: BW, h: H }); }

  return w;
}

function mkRoom(id, act, exits, internal, enemies, pickups, type, lock, bg, ws) {
  return {
    id, act, exits,
    get walls() { return [...buildWalls(this.exits), ...internal]; },
    enemies, pickups,
    cleared: false, type: type || 'combat',
    lockExitsUntilCleared: lock !== false,
    bgColor: bg || PALETTE[3], wallStyle: ws || 'concrete'
  };
}

// ===== 4. AUDIO SYSTEM =====

const Sfx = {
  ctx: null,

  // Call on first keydown (AudioContext requires a user gesture).
  _boot() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (this.ctx.state === 'suspended') this.ctx.resume();
  },

  // Short white-noise buffer of given duration (seconds).
  _noise(dur) {
    const sr  = this.ctx.sampleRate;
    const len = Math.ceil(sr * dur);
    const buf = this.ctx.createBuffer(1, len, sr);
    const d   = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    return buf;
  },

  // Connect a chain of nodes (array) and play from t for dur seconds.
  _play(nodes, t, dur) {
    for (let i = 0; i < nodes.length - 1; i++) nodes[i].connect(nodes[i + 1]);
    nodes[nodes.length - 1].connect(this.ctx.destination);
    const src = nodes[0];
    src.start(t);
    if (dur) src.stop(t + dur + 0.01);
  },

  // Pulse rifle shot: square 880→220 Hz / 0.06 s, gain 0.3→0
  shot() {
    if (!this.ctx) return;
    const { ctx } = this;
    const t    = ctx.currentTime;
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(880, t);
    osc.frequency.exponentialRampToValueAtTime(220, t + 0.06);
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.linearRampToValueAtTime(0, t + 0.06);
    this._play([osc, gain], t, 0.06);
  },

  // Enemy hit: noise burst 0.05 s, high-pass 2000 Hz
  enemyHit() {
    if (!this.ctx) return;
    const { ctx } = this;
    const t    = ctx.currentTime;
    const src  = ctx.createBufferSource();
    src.buffer = this._noise(0.05);
    const hp   = ctx.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 2000;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.5, t);
    gain.gain.linearRampToValueAtTime(0, t + 0.05);
    this._play([src, hp, gain], t);
  },

  // Enemy death: noise burst 0.2 s, low-pass sweeping 1500→100 Hz
  enemyDie() {
    if (!this.ctx) return;
    const { ctx } = this;
    const t    = ctx.currentTime;
    const src  = ctx.createBufferSource();
    src.buffer = this._noise(0.2);
    const lp   = ctx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(1500, t);
    lp.frequency.exponentialRampToValueAtTime(80, t + 0.2);
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.6, t);
    gain.gain.linearRampToValueAtTime(0, t + 0.2);
    this._play([src, lp, gain], t);
  },

  // Player hit: square 110 Hz, 0.15 s, detune wobble
  playerHit() {
    if (!this.ctx) return;
    const { ctx } = this;
    const t    = ctx.currentTime;
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square'; osc.frequency.value = 110;
    osc.detune.setValueAtTime(0,   t);
    osc.detune.linearRampToValueAtTime( 60, t + 0.05);
    osc.detune.linearRampToValueAtTime(-60, t + 0.10);
    osc.detune.linearRampToValueAtTime(  0, t + 0.15);
    gain.gain.setValueAtTime(0.5, t);
    gain.gain.linearRampToValueAtTime(0, t + 0.15);
    this._play([osc, gain], t, 0.15);
  },

  // Pickup: sine 660→990 Hz blip
  pickup() {
    if (!this.ctx) return;
    const { ctx } = this;
    const t    = ctx.currentTime;
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(660, t);
    osc.frequency.linearRampToValueAtTime(990, t + 0.1);
    gain.gain.setValueAtTime(0.35, t);
    gain.gain.linearRampToValueAtTime(0,   t + 0.1);
    this._play([osc, gain], t, 0.1);
  },

  // Door unlock: two rising sine blips (440 then 660 Hz)
  doorOpen() {
    if (!this.ctx) return;
    const { ctx } = this;
    const t = ctx.currentTime;
    [440, 660].forEach((freq, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = freq;
      const s = t + i * 0.09;
      gain.gain.setValueAtTime(0.3,  s);
      gain.gain.linearRampToValueAtTime(0, s + 0.08);
      this._play([osc, gain], s, 0.08);
    });
  },

  // Boss phase transition: low rumble (sine 60 Hz) + reverse cymbal (noise rising)
  bossTransition() {
    if (!this.ctx) return;
    const { ctx } = this;
    const t = ctx.currentTime;
    // Low rumble
    const osc  = ctx.createOscillator();
    const rGain = ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = 60;
    rGain.gain.setValueAtTime(0.7, t);
    rGain.gain.linearRampToValueAtTime(0, t + 1.0);
    this._play([osc, rGain], t, 1.0);
    // Reverse cymbal: noise with bandpass sweeping up
    const src = ctx.createBufferSource();
    src.buffer = this._noise(1.0);
    const bp   = ctx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.setValueAtTime(200, t);
    bp.frequency.exponentialRampToValueAtTime(8000, t + 1.0);
    const nGain = ctx.createGain();
    nGain.gain.setValueAtTime(0,   t);
    nGain.gain.linearRampToValueAtTime(0.5, t + 0.7);
    nGain.gain.linearRampToValueAtTime(0,   t + 1.0);
    this._play([src, bp, nGain], t);
  },

  // Plasma shot: sawtooth 220 Hz, low-pass sweeping down, 0.12 s
  plasma() {
    if (!this.ctx) return;
    const { ctx } = this; const t = ctx.currentTime;
    const osc = ctx.createOscillator(), lp = ctx.createBiquadFilter(), g = ctx.createGain();
    osc.type = 'sawtooth'; osc.frequency.value = 220;
    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(2200, t);
    lp.frequency.exponentialRampToValueAtTime(180, t + 0.12);
    g.gain.setValueAtTime(0.4, t); g.gain.linearRampToValueAtTime(0, t + 0.12);
    this._play([osc, lp, g], t, 0.12);
  },

  // Laser: sine 880 Hz + sawtooth 220 Hz, ring-mod feel, 0.3 s
  laser() {
    if (!this.ctx) return;
    const { ctx } = this; const t = ctx.currentTime;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.35, t); g.gain.linearRampToValueAtTime(0, t + 0.3);
    g.connect(ctx.destination);
    [['sine', 880], ['sawtooth', 220]].forEach(([type, freq]) => {
      const o = ctx.createOscillator();
      o.type = type; o.frequency.value = freq;
      o.connect(g); o.start(t); o.stop(t + 0.31);
    });
  },

  // Grenade explosion: white noise, low-pass 800 Hz, 0.4 s
  grenade() {
    if (!this.ctx) return;
    const { ctx } = this; const t = ctx.currentTime;
    const src = ctx.createBufferSource();
    src.buffer = this._noise(0.4);
    const lp = ctx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 800;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.8, t); g.gain.linearRampToValueAtTime(0, t + 0.4);
    this._play([src, lp, g], t);
  },

  // ── Ambient drones ────────────────────────────────────────────────────────

  _ambientGain:  null,
  _ambientNodes: [],

  _loopNoise() {
    const sr = this.ctx.sampleRate, len = sr * 2;
    const buf = this.ctx.createBuffer(1, len, sr);
    const d   = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    return buf;
  },

  stopAmbient() {
    for (const n of this._ambientNodes) { try { n.stop(); } catch(e) {} }
    this._ambientNodes = [];
    if (this._ambientGain) {
      this._ambientGain.gain.setTargetAtTime(0, this.ctx.currentTime, 0.3);
    }
  },

  startAmbient(act) {
    if (!this.ctx) return;
    this.stopAmbient();
    const ag = this.ctx.createGain();
    ag.gain.setValueAtTime(0, this.ctx.currentTime);
    ag.gain.linearRampToValueAtTime(0.12, this.ctx.currentTime + 1.5);
    ag.connect(this.ctx.destination);
    this._ambientGain = ag;

    const mk = (type, freq) => {
      const o = this.ctx.createOscillator(); o.type = type; o.frequency.value = freq;
      o.connect(ag); o.start(); this._ambientNodes.push(o); return o;
    };
    const mkFilt = (type, freq) => {
      const f = this.ctx.createBiquadFilter(); f.type = type; f.frequency.value = freq;
      return f;
    };

    switch (act) {
      case 1: { // Sine 110 Hz + filtered noise (radio static)
        mk('sine', 110);
        const src = this.ctx.createBufferSource(); src.buffer = this._loopNoise(); src.loop = true;
        const lp = mkFilt('lowpass', 800); src.connect(lp); lp.connect(ag); src.start();
        this._ambientNodes.push(src); break;
      }
      case 2: { // Detuned dual sine 90/93 Hz
        mk('sine', 90); mk('sine', 93); break;
      }
      case 3: { // Sine 60 Hz + slow LFO on cutoff
        const osc = mk('sine', 60);
        const lp  = mkFilt('lowpass', 800);
        const lfo = this.ctx.createOscillator(), lfoG = this.ctx.createGain();
        lfo.frequency.value = 0.25; lfoG.gain.value = 350;
        lfo.connect(lfoG); lfoG.connect(lp.frequency);
        osc.disconnect(); osc.connect(lp); lp.connect(ag);
        lfo.start(); this._ambientNodes.push(lfo); break;
      }
      case 4: { // Pulsing siren 440↔660 Hz + low rumble
        const siren = mk('sine', 550);
        const lfo = this.ctx.createOscillator(), lfoG = this.ctx.createGain();
        lfo.type = 'square'; lfo.frequency.value = 0.5; lfoG.gain.value = 110;
        lfo.connect(lfoG); lfoG.connect(siren.frequency); lfo.start();
        this._ambientNodes.push(lfo);
        mk('sine', 60); break;
      }
    }
  }
};

// ===== 5. INPUT SYSTEM =====

const Input = {
  _held: {},
  _justDown: new Set(), // keys pressed this logic tick (consumed once read)

  init() {
    window.addEventListener('keydown', e => {
      Sfx._boot();
      if (!this._held[e.code]) this._justDown.add(e.code);
      this._held[e.code] = true;
      if (['Space', 'Tab', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
        e.preventDefault();
      }
    });
    window.addEventListener('keyup', e => {
      this._held[e.code] = false;
      // Don't delete from _justDown here: when keydown and keyup fire inside the
      // same event-loop tick (synthetic input or extremely fast presses), the
      // game-loop tick wouldn't see the press at all. consumePressed drains it.
    });
  },

  held(code) { return !!this._held[code]; },

  // Returns true once per key-press; removes from set (consumed).
  consumePressed(code) {
    if (this._justDown.has(code)) { this._justDown.delete(code); return true; }
    return false;
  },

  moveVec() {
    let dx = 0, dy = 0;
    if (this.held('KeyW')) dy -= 1;
    if (this.held('KeyS')) dy += 1;
    if (this.held('KeyA')) dx -= 1;
    if (this.held('KeyD')) dx += 1;
    return { dx, dy };
  },

  // Returns unit aim vector from arrow keys, or null if none held.
  aimVec() {
    if (this.held('ArrowUp'))    return { dx:  0, dy: -1 };
    if (this.held('ArrowDown'))  return { dx:  0, dy:  1 };
    if (this.held('ArrowLeft'))  return { dx: -1, dy:  0 };
    if (this.held('ArrowRight')) return { dx:  1, dy:  0 };
    return null;
  }
};

// ===== 6. ENTITY CLASSES =====

// Push entity out of rect using minimum-overlap axis.
function resolveAABB(ent, rect) {
  const ox1 = ent.x + ent.w - rect.x;
  const ox2 = rect.x + rect.w - ent.x;
  const oy1 = ent.y + ent.h - rect.y;
  const oy2 = rect.y + rect.h - ent.y;
  if (ox1 <= 0 || ox2 <= 0 || oy1 <= 0 || oy2 <= 0) return;
  if (Math.min(ox1, ox2) <= Math.min(oy1, oy2)) {
    ent.x += ox1 <= ox2 ? -ox1 : ox2;
  } else {
    ent.y += oy1 <= oy2 ? -oy1 : oy2;
  }
}

// --- Player ---

class Player {
  constructor(x, y) {
    this.x = x;  this.y = y;
    this.w = 8;  this.h = 8;
    this.hp = 5; this.maxHp = 5;

    this.speed       = 90;    // px/s base
    this.sprintMult  = 1.5;
    this.stamina     = 2;     // seconds at full charge
    this.staminaMax  = 2;
    this.staminaRegen = 0.5;  // per-second; 4 s to full recharge

    this.sprinting   = false;
    this.facing      = { dx: 0, dy: -1 }; // last aim direction

    this.iframes     = 0;     // ticks of invulnerability
    this.fireCooldown = 0;
    // Weapons — expanded in step 10; one entry per owned weapon
    this.weapons = [
      { name: 'PULSE', dmg: 1, rate: 4, speed: 240, ammo: Infinity, maxAmmo: Infinity }
    ];
    this.weaponIdx   = 0;
    this.fireRate    = 4;     // mirrors active weapon (kept for convenience)
    this.bulletSpeed = 240;

    this.grenades    = 1;     // start with 1; max 5
    this.maxGrenades = 5;

    this.alive = true;
  }

  update(dt, walls, bullets) {
    // --- Sprint ---
    const wantSprint = Input.held('ShiftLeft') || Input.held('ShiftRight');
    if (wantSprint && this.stamina > 0) {
      this.sprinting = true;
      this.stamina = Math.max(0, this.stamina - dt);
      if (this.stamina === 0) this.sprinting = false;
    } else {
      this.sprinting = false;
      this.stamina = Math.min(this.staminaMax, this.stamina + this.staminaRegen * dt);
    }

    // --- Move ---
    const { dx, dy } = Input.moveVec();
    const len = Math.hypot(dx, dy);
    if (len > 0) {
      const spd = this.speed * (this.sprinting ? this.sprintMult : 1);
      this.x += (dx / len) * spd * dt;
      this.y += (dy / len) * spd * dt;
    }

    for (const w of walls) resolveAABB(this, w);

    // --- Weapon switch (Tab) ---
    if (Input.consumePressed('Tab') && this.weapons.length > 1) {
      this.weaponIdx    = (this.weaponIdx + 1) % this.weapons.length;
      this.fireCooldown = 0;
    }

    // --- Aim + fire ---
    const aim = Input.aimVec();
    if (aim) this.facing = aim;

    const wep = this.weapons[this.weaponIdx];
    this.fireCooldown = Math.max(0, this.fireCooldown - dt);

    if (aim && this.fireCooldown === 0 && (wep.ammo > 0 || wep.ammo === Infinity)) {
      const cx = this.x + this.w / 2;
      const cy = this.y + this.h / 2;
      if (wep.name === 'LASER') {
        beams.push(new Beam(cx, cy, aim.dx, aim.dy));
        if (wep.ammo !== Infinity) wep.ammo--;
        Sfx.laser();
      } else {
        const pierce = wep.name === 'PLASMA' ? 1 : 0;
        bullets.push(new Bullet(cx - 1, cy - 1,
          aim.dx * wep.speed, aim.dy * wep.speed,
          wep.dmg, 'player', pierce));
        if (wep.ammo !== Infinity) wep.ammo--;
        wep.name === 'PLASMA' ? Sfx.plasma() : Sfx.shot();
      }
      this.fireCooldown = 1 / wep.rate;
    }

    // --- Grenade (Space) ---
    if (Input.consumePressed('Space') && this.grenades > 0) {
      grenadeList.push(new Grenade(
        this.x + this.w / 2 - 2, this.y + this.h / 2 - 2,
        this.facing.dx, this.facing.dy
      ));
      this.grenades--;
    }

    if (this.iframes > 0) this.iframes--;
  }

  takeDamage(dmg) {
    if (this.iframes > 0) return;
    this.hp -= dmg;
    this.iframes = 60;
    spawnHitSparks(this.x + 4, this.y + 4);
    hitShake = 3;
    Sfx.playerHit();
  }

  draw(ctx) {
    const blink = this.iframes > 0 && Math.floor(this.iframes / 4) % 2 === 0;
    ctx.fillStyle = blink ? PALETTE[15] : PALETTE[9];
    ctx.fillRect(Math.round(this.x), Math.round(this.y), this.w, this.h);
    // Gun barrel nub in facing direction
    ctx.fillStyle = PALETTE[5];
    ctx.fillRect(
      Math.round(this.x + 3 + this.facing.dx * 5),
      Math.round(this.y + 3 + this.facing.dy * 5),
      2, 2
    );
  }
}

// --- Bullet ---

class Bullet {
  constructor(x, y, vx, vy, dmg, owner, pierce = 0, tracking = 0) {
    this.x = x;  this.y = y;
    this.vx = vx; this.vy = vy;
    this.w = 2;  this.h = 2;
    this.dmg      = dmg;
    this.owner    = owner;
    this.pierce   = pierce;
    this.tracking = tracking; // homing strength — nudges bullet toward player each frame
    this.hitSet   = new Set();
    this.alive    = true;
  }

  update(dt) {
    if (this.tracking && player && player.alive) {
      const tx = player.x + 4 - this.x, ty = player.y + 4 - this.y;
      const tl = Math.hypot(tx, ty) || 1;
      this.vx += tx / tl * this.tracking * dt;
      this.vy += ty / tl * this.tracking * dt;
      const sp = Math.hypot(this.vx, this.vy) || 1;
      this.vx = this.vx / sp * 90; this.vy = this.vy / sp * 90;
    }
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    if (this.x < -4 || this.x > W + 4 || this.y < -4 || this.y > H + 4) this.alive = false;
  }

  draw(ctx) {
    ctx.fillStyle = this.owner === 'player' ? PALETTE[12] : PALETTE[10];
    ctx.fillRect(Math.round(this.x), Math.round(this.y), this.w, this.h);
  }
}

// AABB overlap test (no push — for collision queries).
function overlaps(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

// Fire one enemy bullet aimed 8-16 px off the player (intentional miss).
function _fireAt(cx, cy, px, py, speed, bullets) {
  const miss = 8 + Math.random() * 8;
  const mAng = Math.random() * Math.PI * 2;
  const tx = px + Math.cos(mAng) * miss;
  const ty = py + Math.sin(mAng) * miss;
  const dx = tx - cx, dy = ty - cy;
  const len = Math.hypot(dx, dy);
  if (len > 0) bullets.push(new Bullet(cx - 1, cy - 1,
    dx / len * speed, dy / len * speed, 1, 'enemy'));
}

// --- Enemy (base) ---

class Enemy {
  constructor(x, y, w, h) {
    this.x = x; this.y = y;
    this.w = w; this.h = h;
    this.hp = 1; this.maxHp = 1;
    this.alive   = true;
    this.iframes = 0;
    this.kbVx = 0; this.kbVy = 0; this.kbTimer = 0; // knockback velocity
  }

  takeDamage(dmg) {
    if (this.iframes > 0) return;
    this.hp -= dmg;
    this.iframes = 8;
    if (this.hp <= 0) {
      this.alive = false;
      spawnDeathBurst(this.x + this.w / 2, this.y + this.h / 2);
      Sfx.enemyDie();
    } else Sfx.enemyHit();
  }
}

// --- Grunt ---
// 12×16 khaki soldier. 2 HP. 50 px/s patrol.
// Detects player at <150 px — stops and fires once/s with intentional miss.

class Grunt extends Enemy {
  constructor(x, y) {
    super(x, y, 12, 16);
    this.hp = 2; this.maxHp = 2;
    this.speed = 50;
    this.dir   = Math.random() < 0.5 ? 1 : -1;
    this.state = 'PATROL';
    this.fireCooldown = 1 + Math.random(); // stagger initial shots
  }

  update(dt, walls, player, bullets) {
    const cx = this.x + this.w / 2;
    const cy = this.y + this.h / 2;
    const px = player.x + player.w / 2;
    const py = player.y + player.h / 2;

    this.iframes      = Math.max(0, this.iframes - 1);
    this.fireCooldown = Math.max(0, this.fireCooldown - dt);

    this.state = Math.hypot(cx - px, cy - py) < 150 ? 'ATTACK' : 'PATROL';

    if (this.state === 'PATROL') {
      const prevX = this.x;
      this.x += this.dir * this.speed * dt;
      for (const w of walls) resolveAABB(this, w);
      // Wall collision stopped horizontal movement → reverse
      if (Math.abs(this.x - prevX) < this.speed * dt * 0.5) this.dir *= -1;

    } else if (this.fireCooldown === 0) {
      // Fire toward a point 8-16px off the player (intentional miss)
      const miss = 8 + Math.random() * 8;
      const mAng = Math.random() * Math.PI * 2;
      const tx = px + Math.cos(mAng) * miss;
      const ty = py + Math.sin(mAng) * miss;
      const tdx = tx - cx, tdy = ty - cy;
      const tlen = Math.hypot(tdx, tdy);
      if (tlen > 0) {
        bullets.push(new Bullet(cx - 1, cy - 1,
          (tdx / tlen) * 120, (tdy / tlen) * 120, 1, 'enemy'));
      }
      this.fireCooldown = 1;
    }

    // Contact damage to player handled in game loop via overlaps()
  }

  draw(ctx) {
    const flash = this.iframes > 0 && Math.floor(this.iframes / 2) % 2 === 0;
    // Body (torso + legs)
    ctx.fillStyle = flash ? PALETTE[15] : PALETTE[7]; // khaki uniform
    ctx.fillRect(Math.round(this.x + 2), Math.round(this.y + 5), 8, 11);
    // Head
    ctx.fillStyle = flash ? PALETTE[15] : PALETTE[6]; // brown
    ctx.fillRect(Math.round(this.x + 3), Math.round(this.y),  6,  5);
  }
}

// --- Sergeant ---
// 14×18, dark fatigues + red beret. 3 HP. 60 px/s.
// Burst-fires 3 shots, then dashes for cover.

class Sergeant extends Enemy {
  constructor(x, y) {
    super(x, y, 14, 18);
    this.hp = 3; this.maxHp = 3;
    this.speed = 60;
    this.dir   = Math.random() < 0.5 ? 1 : -1;
    this.state = 'PATROL';
    this.burstCount   = 0;
    this.fireCooldown = 1 + Math.random();
    this.coverTimer   = 0;
    this.coverDx = 0; this.coverDy = 0;
  }

  update(dt, walls, player, bullets) {
    const cx = this.x + this.w / 2, cy = this.y + this.h / 2;
    const px = player.x + player.w / 2, py = player.y + player.h / 2;
    const dist = Math.hypot(cx - px, cy - py);
    this.iframes      = Math.max(0, this.iframes - 1);
    this.fireCooldown = Math.max(0, this.fireCooldown - dt);

    if (this.state === 'PATROL') {
      const prevX = this.x;
      this.x += this.dir * this.speed * dt;
      for (const w of walls) resolveAABB(this, w);
      if (Math.abs(this.x - prevX) < this.speed * dt * 0.5) this.dir *= -1;
      if (dist < 140) { this.state = 'SHOOT'; this.burstCount = 0; this.fireCooldown = 0.2; }

    } else if (this.state === 'SHOOT') {
      if (this.burstCount >= 3) {
        this.state = 'COVER'; this.burstCount = 0;
        this.coverTimer = 0.5 + Math.random() * 0.5;
        this.coverDx = Math.random() < 0.5 ? 1 : -1;
        this.coverDy = (Math.random() - 0.5);
      } else if (this.fireCooldown === 0) {
        _fireAt(cx, cy, px, py, 140, bullets);
        this.burstCount++;
        this.fireCooldown = 0.15;
      }

    } else { // COVER
      this.x += this.coverDx * this.speed * dt;
      this.y += this.coverDy * this.speed * dt;
      for (const w of walls) resolveAABB(this, w);
      this.coverTimer -= dt;
      if (this.coverTimer <= 0) {
        this.state = dist < 140 ? 'SHOOT' : 'PATROL';
        this.fireCooldown = 0.3;
      }
    }
  }

  draw(ctx) {
    const fl = this.iframes > 0 && Math.floor(this.iframes / 2) % 2 === 0;
    ctx.fillStyle = fl ? PALETTE[15] : PALETTE[8]; // dark green fatigues
    ctx.fillRect(Math.round(this.x + 2), Math.round(this.y + 5), 10, 13);
    ctx.fillStyle = fl ? PALETTE[15] : PALETTE[6]; // head
    ctx.fillRect(Math.round(this.x + 3), Math.round(this.y + 1),  8,  4);
    ctx.fillStyle = fl ? PALETTE[15] : PALETTE[10]; // red beret
    ctx.fillRect(Math.round(this.x + 2), Math.round(this.y - 2), 10,  3);
  }
}

// --- Twitchy ---
// 12×16, visible alien bulges. 2 HP. 110 px/s. No shooting — charges player.

class Twitchy extends Enemy {
  constructor(x, y) {
    super(x, y, 12, 16);
    this.hp = 2; this.maxHp = 2;
    this.speed = 110;
  }

  update(dt, walls, player, bullets) {
    const cx = this.x + this.w / 2, cy = this.y + this.h / 2;
    const px = player.x + player.w / 2, py = player.y + player.h / 2;
    const dist = Math.hypot(cx - px, cy - py);
    this.iframes = Math.max(0, this.iframes - 1);
    if (dist > 0) {
      this.x += (px - cx) / dist * this.speed * dt;
      this.y += (py - cy) / dist * this.speed * dt;
    }
    for (const w of walls) resolveAABB(this, w);
  }

  draw(ctx) {
    const fl = this.iframes > 0 && Math.floor(this.iframes / 2) % 2 === 0;
    ctx.fillStyle = fl ? PALETTE[15] : PALETTE[7]; // khaki
    ctx.fillRect(Math.round(this.x + 1), Math.round(this.y + 4), 10, 12);
    ctx.fillStyle = fl ? PALETTE[15] : PALETTE[6]; // head
    ctx.fillRect(Math.round(this.x + 3), Math.round(this.y),  6,  4);
    // Alien bulges (foreshadow act 2)
    ctx.fillStyle = fl ? PALETTE[15] : PALETTE[14]; // magenta
    ctx.fillRect(Math.round(this.x + 2), Math.round(this.y + 6),  3, 3);
    ctx.fillRect(Math.round(this.x + 7), Math.round(this.y + 9),  3, 3);
  }
}

// --- GeneralHayes (Boss) ---
// Phase 1: 8 HP, 16×20 officer. Burst-fires 3-shot salvos, retreats to desk cover.
// Phase 2 (The Vessel): 12 HP, 24×24. Charges at 140 px/s + ranged spit every 1.5 s.

class GeneralHayes extends Enemy {
  constructor(x, y) {
    super(x, y, 16, 20);
    this.hp = 8; this.maxHp = 8;
    this.phase = 1;
    this.speed = 70;
    this.state = 'APPROACH';

    this.burstCount   = 0;
    this.fireCooldown = 0;
    this.coverTimer   = 0;
    this.coverDx = 0; this.coverDy = 0;

    // Phase 2
    this.spitTimer    = 2;
    this.charging     = false;
    this.chargeTimer  = 0;
    this.chargeDx = 0; this.chargeDy = 0;

    // Transition animation
    this.transitioning  = false;
    this.transitionTimer = 0;

    // Dialogue
    this._lines    = ["You shouldn't have come here.", "We're past saving.", "You're already too late."];
    this._lineIdx  = 0;
    this.dialogueText  = '';
    this.dialogueTimer = 0;
    this._hpThresholds = [6, 3]; // trigger next line at these HP values
  }

  // Cover positions (adjacent to the four corner desks in act1_r10)
  _nearestCover(cx, cy) {
    const pts = [{ x: 68, y: 42 }, { x: 252, y: 42 }, { x: 68, y: 194 }, { x: 252, y: 194 }];
    return pts.reduce((best, p) =>
      Math.hypot(cx - p.x, cy - p.y) < Math.hypot(cx - best.x, cy - best.y) ? p : best);
  }

  _triggerDialogue() {
    if (this._lineIdx < this._lines.length) {
      this.dialogueText  = this._lines[this._lineIdx++];
      this.dialogueTimer = 3;
    }
  }

  takeDamage(dmg) {
    if (this.iframes > 0 || this.transitioning) return;
    this.hp -= dmg;
    this.iframes = 8;
    // Dialogue thresholds
    if (this._hpThresholds.length && this.hp <= this._hpThresholds[0]) {
      this._hpThresholds.shift();
      this._triggerDialogue();
    }
    if (this.hp <= 0) {
      if (this.phase === 1) {
        this.hp = 0;
        this.transitioning  = true;
        this.transitionTimer = 1.0;
        this.iframes = 60;
        this._triggerDialogue(); // "You're already too late."
        Sfx.bossTransition();
      } else {
        this.alive = false;
        Sfx.enemyDie();
      }
    } else { Sfx.enemyHit(); }
  }

  update(dt, walls, player, bullets) {
    const cx = this.x + this.w / 2, cy = this.y + this.h / 2;
    const px = player.x + player.w / 2, py = player.y + player.h / 2;
    const dist = Math.hypot(cx - px, cy - py);

    this.iframes      = Math.max(0, this.iframes - 1);
    this.fireCooldown = Math.max(0, this.fireCooldown - dt);
    if (this.dialogueTimer > 0) this.dialogueTimer -= dt;

    if (this.transitioning) {
      this.transitionTimer -= dt;
      if (this.transitionTimer <= 0) {
        this.transitioning = false;
        this.phase = 2;
        this.hp = 12; this.maxHp = 12;
        this.w = 24;  this.h = 24;
        this.speed = 90;
        this.state = 'ROAM';
        this.spitTimer = 1.5;
        this.dialogueText = ''; // clear last line
      }
      return;
    }

    if (this.phase === 1) {
      // --- APPROACH: close the gap ---
      if (this.state === 'APPROACH') {
        if (this.burstCount === 0 && dist < 130) this._triggerDialogue();
        if (dist > 0) {
          const s = this.speed * dt / dist;
          this.x += (px - cx) * s; this.y += (py - cy) * s;
        }
        for (const w of walls) resolveAABB(this, w);
        if (dist < 130) { this.state = 'SHOOT'; this.burstCount = 0; }

      // --- SHOOT: 3-shot burst ---
      } else if (this.state === 'SHOOT') {
        if (this.burstCount >= 3) {
          this.state = 'COVER'; this.burstCount = 0;
          this.coverTimer = 0.7 + Math.random() * 0.4;
          const cover = this._nearestCover(cx, cy);
          const cd = Math.hypot(cover.x - cx, cover.y - cy) || 1;
          this.coverDx = (cover.x - cx) / cd;
          this.coverDy = (cover.y - cy) / cd;
        } else if (this.fireCooldown === 0) {
          _fireAt(cx, cy, px, py, 140, bullets);
          this.burstCount++;
          this.fireCooldown = 0.15;
        }

      // --- COVER: retreat to desk ---
      } else {
        this.x += this.coverDx * this.speed * dt;
        this.y += this.coverDy * this.speed * dt;
        for (const w of walls) resolveAABB(this, w);
        this.coverTimer -= dt;
        if (this.coverTimer <= 0) this.state = 'APPROACH';
      }

    } else {
      // Phase 2 — The Vessel
      this.spitTimer = Math.max(0, this.spitTimer - dt);

      if (this.charging) {
        this.x += this.chargeDx * 140 * dt;
        this.y += this.chargeDy * 140 * dt;
        for (const w of walls) resolveAABB(this, w);
        this.chargeTimer -= dt;
        if (this.chargeTimer <= 0) this.charging = false;
      } else if (dist < 80) {
        // Start charge
        this.charging = true; this.chargeTimer = 1.5;
        this.chargeDx = (px - cx) / (dist || 1);
        this.chargeDy = (py - cy) / (dist || 1);
      } else {
        // Roam toward player
        if (dist > 0) {
          const s = this.speed * dt / dist;
          this.x += (px - cx) * s; this.y += (py - cy) * s;
        }
        for (const w of walls) resolveAABB(this, w);
      }

      // Spit
      if (this.spitTimer === 0) {
        _fireAt(cx, cy, px, py, 120, bullets);
        this.spitTimer = 1.5;
      }
    }
  }

  draw(ctx) {
    if (this.transitioning) {
      const fl = Math.floor(this.transitionTimer * 16) % 2 === 0;
      ctx.fillStyle = fl ? PALETTE[10] : PALETTE[15];
      ctx.fillRect(Math.round(this.x), Math.round(this.y), this.w, this.h);
      return;
    }
    const fl = this.iframes > 0 && Math.floor(this.iframes / 2) % 2 === 0;
    if (this.phase === 1) {
      // Officer dress uniform
      ctx.fillStyle = fl ? PALETTE[15] : PALETTE[2]; // dark blue uniform
      ctx.fillRect(Math.round(this.x + 2), Math.round(this.y + 6), 12, 14);
      ctx.fillStyle = fl ? PALETTE[15] : PALETTE[6]; // skin
      ctx.fillRect(Math.round(this.x + 4), Math.round(this.y),  8,  6);
      ctx.fillStyle = fl ? PALETTE[15] : PALETTE[12]; // gold trim
      ctx.fillRect(Math.round(this.x + 5), Math.round(this.y + 8), 6, 2);
    } else {
      // The Vessel — chitinous body
      ctx.fillStyle = fl ? PALETTE[15] : PALETTE[13]; // purple chitin
      ctx.fillRect(Math.round(this.x), Math.round(this.y), this.w, this.h);
      // Glowing eyes
      ctx.fillStyle = PALETTE[14];
      ctx.fillRect(Math.round(this.x + 4),  Math.round(this.y + 5), 4, 3);
      ctx.fillRect(Math.round(this.x + 16), Math.round(this.y + 5), 4, 3);
      ctx.fillStyle = PALETTE[0];
      ctx.fillRect(Math.round(this.x + 5),  Math.round(this.y + 6), 2, 1);
      ctx.fillRect(Math.round(this.x + 17), Math.round(this.y + 6), 2, 1);
    }
  }
}

// --- Pickup ---

class Pickup {
  constructor(type, x, y) {
    this.type = type;
    this.x = x - 6; this.y = y - 6; // center 12×12 on given coords
    this.w = 12; this.h = 12;
    this.alive = true;
  }

  draw(ctx) {
    const C = { pistol: 7, plasma_rifle: 9, heavy_laser: 12,
                medstim: 10, grenade: 11, ammo_plasma: 9, ammo_laser: 12 };
    const L = { pistol: 'P', plasma_rifle: 'PL', heavy_laser: 'HL',
                medstim: '+', grenade: 'G', ammo_plasma: 'AM', ammo_laser: 'AM' };
    ctx.fillStyle = PALETTE[0];
    ctx.fillRect(Math.round(this.x), Math.round(this.y), this.w, this.h);
    ctx.fillStyle = PALETTE[C[this.type] || 5];
    ctx.fillRect(Math.round(this.x + 1), Math.round(this.y + 1), 10, 10);
    ctx.fillStyle = PALETTE[15];
    ctx.font = '6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(L[this.type] || '?', Math.round(this.x + 6), Math.round(this.y + 8));
    ctx.textAlign = 'left';
  }
}

// Collect a pickup: apply effect and remove from room data so it won't respawn.
function collectPickup(pickup) {
  pickup.alive = false;
  const room = RoomManager.current;
  const idx  = room.pickups.findIndex(p =>
    p.type === pickup.type &&
    Math.abs(p.x - (pickup.x + 6)) < 2 && Math.abs(p.y - (pickup.y + 6)) < 2);
  if (idx >= 0) room.pickups.splice(idx, 1);

  switch (pickup.type) {
    case 'pistol':
      if (!player.weapons.find(w => w.name === 'PISTOL'))
        player.weapons.push({ name: 'PISTOL', dmg: 1, rate: 6, speed: 200, ammo: Infinity, maxAmmo: Infinity });
      break;
    case 'plasma_rifle':
      if (!player.weapons.find(w => w.name === 'PLASMA'))
        player.weapons.push({ name: 'PLASMA', dmg: 2, rate: 2, speed: 160, ammo: 30, maxAmmo: 60 });
      break;
    case 'heavy_laser':
      if (!player.weapons.find(w => w.name === 'LASER'))
        player.weapons.push({ name: 'LASER', dmg: 4, rate: 1, speed: 0, ammo: 8, maxAmmo: 16 });
      break;
    case 'medstim':
      player.hp = Math.min(player.maxHp, player.hp + 2);
      break;
    case 'grenade':
      player.maxGrenades = Math.min(5, player.maxGrenades + 1);
      player.grenades    = Math.min(player.maxGrenades, player.grenades + 1);
      break;
    case 'ammo_plasma': { const w = player.weapons.find(w => w.name === 'PLASMA');
      if (w) w.ammo = Math.min(w.maxAmmo, w.ammo + 15); break; }
    case 'ammo_laser':  { const w = player.weapons.find(w => w.name === 'LASER');
      if (w) w.ammo = Math.min(w.maxAmmo, w.ammo + 4);  break; }
  }
  Sfx.pickup();
}

// --- Beam (Heavy Laser) ---

// Slab-method ray–AABB distance. Returns t where ray first enters any wall rect.
function raycastDist(ox, oy, dx, dy, walls) {
  let best = Math.hypot(W, H);
  for (const w of walls) {
    const txA = dx ? (w.x - ox) / dx : -Infinity;
    const txB = dx ? (w.x + w.w - ox) / dx : Infinity;
    const tyA = dy ? (w.y - oy) / dy : -Infinity;
    const tyB = dy ? (w.y + w.h - oy) / dy : Infinity;
    const tEnter = Math.max(Math.min(txA, txB), Math.min(tyA, tyB));
    const tLeave  = Math.min(Math.max(txA, txB), Math.max(tyA, tyB));
    if (tLeave >= 0 && tEnter <= tLeave && tEnter >= 0 && tEnter < best) best = tEnter;
  }
  return best;
}

class Beam {
  constructor(ox, oy, dx, dy) {
    this.ox = ox; this.oy = oy;
    this.dx = dx; this.dy = dy;
    this.length = raycastDist(ox, oy, dx, dy, RoomManager.activeWalls());
    this.timer  = 0.12;
    this.alive  = true;
    this._damage();
  }

  _damage() {
    for (const e of enemies) {
      if (!e.alive) continue;
      const ecx = e.x + e.w / 2, ecy = e.y + e.h / 2;
      // Project enemy centre onto beam segment
      const t  = Math.max(0, Math.min(this.length,
        (ecx - this.ox) * this.dx + (ecy - this.oy) * this.dy));
      const nx = this.ox + this.dx * t, ny = this.oy + this.dy * t;
      if (Math.hypot(nx - ecx, ny - ecy) < 10) {
        e.takeDamage(4);
        const kd = Math.hypot(ecx - this.ox, ecy - this.oy) || 1;
        e.kbVx = (ecx - this.ox) / kd * 260;
        e.kbVy = (ecy - this.oy) / kd * 260;
        e.kbTimer = 0.25;
      }
    }
  }

  update(dt) { this.timer -= dt; if (this.timer <= 0) this.alive = false; }

  draw(ctx) {
    ctx.globalAlpha = Math.max(0, this.timer / 0.12);
    const len = Math.round(this.length);
    if (this.dx !== 0) {
      const x = this.dx > 0 ? this.ox : this.ox - len;
      ctx.fillStyle = PALETTE[12]; ctx.fillRect(Math.round(x), Math.round(this.oy - 1), len, 3);
      ctx.fillStyle = PALETTE[15]; ctx.fillRect(Math.round(x), Math.round(this.oy),     len, 1);
    } else {
      const y = this.dy > 0 ? this.oy : this.oy - len;
      ctx.fillStyle = PALETTE[12]; ctx.fillRect(Math.round(this.ox - 1), Math.round(y), 3, len);
      ctx.fillStyle = PALETTE[15]; ctx.fillRect(Math.round(this.ox),     Math.round(y), 1, len);
    }
    ctx.globalAlpha = 1;
  }
}

// --- Grenade ---

class Grenade {
  constructor(x, y, dx, dy) {
    this.x = x; this.y = y;
    this.w = 4; this.h = 4;
    this.vx = dx * 120; this.vy = dy * 120;
    this.fuse      = 0.8;
    this.exploded  = false;
    this.flashTimer = 0;
    this.alive     = true;
  }

  update(dt, walls) {
    if (this.exploded) {
      this.flashTimer -= dt;
      if (this.flashTimer <= 0) this.alive = false;
      return;
    }
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    // Bounce off walls
    for (const w of walls) {
      const px = this.x, py = this.y;
      resolveAABB(this, w);
      if (this.x !== px) this.vx *= -0.5;
      if (this.y !== py) this.vy *= -0.5;
    }
    this.fuse -= dt;
    if (this.fuse <= 0) this._explode();
  }

  _explode() {
    this.exploded   = true;
    this.flashTimer = 0.2;
    const cx = this.x + 2, cy = this.y + 2;
    for (const e of enemies) {
      if (e.alive && Math.hypot((e.x + e.w/2) - cx, (e.y + e.h/2) - cy) < 32)
        e.takeDamage(3);
    }
    Sfx.grenade();
  }

  draw(ctx) {
    if (this.exploded) {
      ctx.globalAlpha = Math.max(0, this.flashTimer / 0.2);
      ctx.fillStyle   = PALETTE[11];
      ctx.fillRect(Math.round(this.x - 26), Math.round(this.y - 26), 60, 60);
      ctx.globalAlpha = 1;
      return;
    }
    ctx.fillStyle = PALETTE[11];
    ctx.fillRect(Math.round(this.x), Math.round(this.y), this.w, this.h);
  }
}

// --- HybridSoldier ---
// 14×18, ragged uniform + chitinous carapace. 4 HP. 70 px/s.
// 2-shot burst; lunges at player if within 60 px.

class HybridSoldier extends Enemy {
  constructor(x, y) {
    super(x, y, 14, 18);
    this.hp = 4; this.maxHp = 4;
    this.speed = 70;
    this.dir   = Math.random() < 0.5 ? 1 : -1;
    this.state = 'PATROL';
    this.burstCount   = 0;
    this.fireCooldown = 1 + Math.random();
    this.coverTimer   = 0;
    this.coverDx = 0; this.coverDy = 0;
    this.lunging      = false;
    this.lungeTimer   = 0;
    this.lungeDx = 0; this.lungeDy = 0;
    this.lungeCooldown = 2 + Math.random();
  }

  update(dt, walls, player, bullets) {
    const cx = this.x + 7, cy = this.y + 9;
    const px = player.x + 4, py = player.y + 4;
    const dist = Math.hypot(cx - px, cy - py);
    this.iframes      = Math.max(0, this.iframes - 1);
    this.fireCooldown = Math.max(0, this.fireCooldown - dt);
    this.lungeCooldown = Math.max(0, this.lungeCooldown - dt);

    if (this.lunging) {
      this.x += this.lungeDx * 200 * dt;
      this.y += this.lungeDy * 200 * dt;
      for (const w of walls) resolveAABB(this, w);
      this.lungeTimer -= dt;
      if (this.lungeTimer <= 0) { this.lunging = false; this.state = 'PATROL'; }
      return;
    }

    if (dist < 60 && this.lungeCooldown === 0) {
      this.lunging = true; this.lungeTimer = 0.3;
      this.lungeCooldown = 2 + Math.random();
      const d = dist || 1;
      this.lungeDx = (px - cx) / d; this.lungeDy = (py - cy) / d;
      return;
    }

    if (this.state === 'PATROL') {
      const prevX = this.x;
      this.x += this.dir * this.speed * dt;
      for (const w of walls) resolveAABB(this, w);
      if (Math.abs(this.x - prevX) < this.speed * dt * 0.5) this.dir *= -1;
      if (dist < 120) { this.state = 'SHOOT'; this.burstCount = 0; this.fireCooldown = 0.2; }
    } else if (this.state === 'SHOOT') {
      if (this.burstCount >= 2) {
        this.state = 'COVER'; this.burstCount = 0;
        this.coverTimer = 0.6 + Math.random() * 0.4;
        this.coverDx = Math.random() < 0.5 ? 1 : -1;
        this.coverDy = (Math.random() - 0.5);
      } else if (this.fireCooldown === 0) {
        _fireAt(cx, cy, px, py, 140, bullets);
        this.burstCount++;
        this.fireCooldown = 0.18;
      }
    } else {
      this.x += this.coverDx * this.speed * dt;
      this.y += this.coverDy * this.speed * dt;
      for (const w of walls) resolveAABB(this, w);
      this.coverTimer -= dt;
      if (this.coverTimer <= 0) { this.state = dist < 120 ? 'SHOOT' : 'PATROL'; this.fireCooldown = 0.2; }
    }
  }

  draw(ctx) {
    const fl = this.iframes > 0 && Math.floor(this.iframes / 2) % 2 === 0;
    ctx.fillStyle = fl ? PALETTE[15] : PALETTE[6];  // ragged brown uniform
    ctx.fillRect(Math.round(this.x + 2), Math.round(this.y + 5), 10, 13);
    ctx.fillStyle = fl ? PALETTE[15] : PALETTE[13]; // purple carapace chest
    ctx.fillRect(Math.round(this.x + 3), Math.round(this.y + 5),  8,  8);
    ctx.fillStyle = fl ? PALETTE[15] : PALETTE[6];  // head
    ctx.fillRect(Math.round(this.x + 3), Math.round(this.y),  8,  5);
  }
}

// --- AlienGrunt ---
// 14×16, chitinous. 3 HP. 100 px/s. Pure melee. Faster + tougher than Twitchy.

class AlienGrunt extends Enemy {
  constructor(x, y) {
    super(x, y, 14, 16);

    this.speed = 100;
  }

  update(dt, walls, player, bullets) {
    const cx = this.x + 7, cy = this.y + 8;
    const px = player.x + 4, py = player.y + 4;
    const dist = Math.hypot(cx - px, cy - py);
    this.iframes = Math.max(0, this.iframes - 1);
    if (dist > 0) {
      this.x += (px - cx) / dist * this.speed * dt;
      this.y += (py - cy) / dist * this.speed * dt;
    }
    for (const w of walls) resolveAABB(this, w);
  }

  draw(ctx) {
    const fl = this.iframes > 0 && Math.floor(this.iframes / 2) % 2 === 0;
    ctx.fillStyle = fl ? PALETTE[15] : PALETTE[13];
    ctx.fillRect(Math.round(this.x + 1), Math.round(this.y + 4), 12, 12);
    ctx.fillStyle = fl ? PALETTE[15] : PALETTE[14];
    ctx.fillRect(Math.round(this.x + 2), Math.round(this.y),  10,  4);
    ctx.fillStyle = fl ? PALETTE[15] : PALETTE[0]; // claws
    ctx.fillRect(Math.round(this.x),     Math.round(this.y + 7), 3, 5);

}

// --- SporeDrone ---
// 12×12, bloated. 1 HP. 30 px/s. Explodes on death or contact → 24 px spore cloud.

class SporeDrone extends Enemy {
  constructor(x, y) {
    super(x, y, 12, 12);
    this.hp = 1; this.maxHp = 1;
    this.speed = 30;
    this._exploding = false;
  }

  update(dt, walls, player, bullets) {
    if (this._exploding) return;
    const cx = this.x + 6, cy = this.y + 6;
    const px = player.x + 4, py = player.y + 4;
    const dist = Math.hypot(cx - px, cy - py);
    this.iframes = Math.max(0, this.iframes - 1);
    if (dist > 0) {
      this.x += (px - cx) / dist * this.speed * dt;
      this.y += (py - cy) / dist * this.speed * dt;
    }
    for (const w of walls) resolveAABB(this, w);
    if (dist < 14) this._burst();
  }

  takeDamage(dmg) {
    if (this.iframes > 0) return;
    this.hp -= dmg; this.iframes = 8;
    if (this.hp <= 0) this._burst();
    else Sfx.enemyHit();
  }

  _burst() {
    if (this._exploding) return;
    this._exploding = true;
    this.alive = false;
    sporeClouds.push(new SporeCloud(this.x + 6, this.y + 6));
    Sfx.enemyDie();
  }

  draw(ctx) {
    const fl = this.iframes > 0 && Math.floor(this.iframes / 2) % 2 === 0;
    ctx.fillStyle = fl ? PALETTE[15] : PALETTE[13];
    ctx.fillRect(Math.round(this.x), Math.round(this.y), 12, 12);
    ctx.fillStyle = fl ? PALETTE[15] : PALETTE[9];
    ctx.fillRect(Math.round(this.x + 3), Math.round(this.y + 3), 6, 6);
  }
}

// --- SporeCloud ---
// Lingers 3 s; damages player once per second on contact.

class SporeCloud {
  constructor(x, y) {
    this.x = x - 12; this.y = y - 12;
    this.w = 24; this.h = 24;
    this.timer    = 3;
    this.dmgTimer = 0;
    this.alive    = true;
  }

  update(dt) {
    this.timer    -= dt;
    this.dmgTimer  = Math.max(0, this.dmgTimer - dt);
    if (this.timer <= 0) { this.alive = false; return; }
    if (overlaps(this, player) && this.dmgTimer === 0) {
      player.takeDamage(1);
      this.dmgTimer = 1;
    }
  }

  draw(ctx) {
    ctx.globalAlpha = Math.min(0.55, this.timer / 3 * 0.55);
    ctx.fillStyle   = PALETTE[13];
    ctx.fillRect(Math.round(this.x), Math.round(this.y), this.w, this.h);
    ctx.globalAlpha = 1;
  }
}

// --- BroodNode ---
// Stationary pulsing node. 3 HP. Spawns AlienGrunt every 6 s while alive.

class BroodNode extends Enemy {
  constructor(x, y) {
    super(x, y, 14, 14);
    this.hp = 3; this.maxHp = 3;
    this.spawnTimer = 6 + Math.random() * 2; // stagger initial spawns

  }

  update(dt, walls, player, bullets) {
    this.iframes    = Math.max(0, this.iframes - 1);
    this.pulseT    += dt * 3;
    this.spawnTimer -= dt;
    if (this.spawnTimer <= 0) {
      enemies.push(new AlienGrunt(
        this.x + (Math.random() - 0.5) * 40,
        this.y + (Math.random() - 0.5) * 40
      ));

    }
  }

  draw(ctx) {

    const size = 14 + Math.round((Math.sin(this.pulseT) * 0.5 + 0.5) * 4);
    const off  = Math.round((size - 14) / 2);

// --- BroodMother ---
// 18 HP. 40×40. Stationary. Invulnerable while any node is alive.
// Kill all nodes → 10 s damage window → nodes respawn. Repeat until dead.

class BroodMother extends Enemy {
  constructor(x, y) {
    super(x, y, 40, 40);
    this.hp = 18; this.maxHp = 18;
    this.vulnerable      = false;
    this.vulnerableTimer = 0;
    this.spitTimer       = 3;
    this.nodes           = []; // populated by _spawnNodes()
    // Fixed node positions for act2_r10
    this._nodePos = [{ x: 41, y: 25 }, { x: 257, y: 25 }, { x: 153, y: 185 }];
  }

  _spawnNodes() {
    for (const p of this._nodePos) {
      const n = new BroodNode(p.x, p.y);
      enemies.push(n);
      this.nodes.push(n);
    }
  }

  takeDamage(dmg) {
    if (!this.vulnerable || this.iframes > 0) return;
    this.hp -= dmg; this.iframes = 8;
    if (this.hp <= 0) {
      for (const n of this.nodes) n.alive = false; // kill remaining nodes
      this.alive = false; Sfx.enemyDie();
    } else { Sfx.enemyHit(); }
  }

  update(dt, walls, player, bullets) {
    this.iframes   = Math.max(0, this.iframes - 1);
    this.spitTimer = Math.max(0, this.spitTimer - dt);

    const allDead = this.nodes.length > 0 && this.nodes.every(n => !n.alive);

    if (allDead && !this.vulnerable) {
      this.vulnerable      = true;
      this.vulnerableTimer = 10;
      this.nodes           = []; // clear refs; new ones added in respawn
    }

    if (this.vulnerable) {
      this.vulnerableTimer -= dt;
      if (this.vulnerableTimer <= 0 && this.hp > 0) {
        this.vulnerable = false;
        this._spawnNodes();
      }
    }

    // Spit (faster when vulnerable)
    if (this.spitTimer === 0) {
      const cx = this.x + 20, cy = this.y + 20;
      _fireAt(cx, cy, player.x + 4, player.y + 4, 90, bullets);
      this.spitTimer = this.vulnerable ? 2 : 3;
    }
  }

  draw(ctx) {
    const fl = this.iframes > 0 && Math.floor(this.iframes / 2) % 2 === 0;
    // Main body
    ctx.fillStyle = fl ? PALETTE[15] : (this.vulnerable ? PALETTE[10] : PALETTE[13]);
    ctx.fillRect(Math.round(this.x), Math.round(this.y), 40, 40);
    // Organic texture rings
    ctx.fillStyle = fl ? PALETTE[15] : PALETTE[0];
    ctx.fillRect(Math.round(this.x + 4),  Math.round(this.y + 4),  32, 32);
    ctx.fillStyle = fl ? PALETTE[15] : (this.vulnerable ? PALETTE[11] : PALETTE[14]);
    ctx.fillRect(Math.round(this.x + 8),  Math.round(this.y + 8),  24, 24);
    ctx.fillStyle = fl ? PALETTE[15] : PALETTE[0];
    ctx.fillRect(Math.round(this.x + 14), Math.round(this.y + 14), 12, 12);
    // Pulsing core
    ctx.fillStyle = fl ? PALETTE[15] : PALETTE[14];
    ctx.fillRect(Math.round(this.x + 16), Math.round(this.y + 16),  8,  8);
  }
}

// --- Stalker ---
// 14×16, insectoid. 3 HP. 130 px/s. Charges far; strafes perpendicular when ≤50px.

class Stalker extends Enemy {
  constructor(x, y) {
    super(x, y, 14, 16);
    this.hp = 3; this.maxHp = 3;
    this.speed = 130;
    this.strafeDir   = Math.random() < 0.5 ? 1 : -1;
    this.strafeTimer = 0.5 + Math.random() * 0.5;
  }

  update(dt, walls, player, bullets) {
    const cx = this.x + 7, cy = this.y + 8;
    const px = player.x + 4, py = player.y + 4;
    const dx = px - cx, dy = py - cy;
    const dist = Math.hypot(dx, dy) || 1;
    this.iframes = Math.max(0, this.iframes - 1);
    let mvx, mvy;
    if (dist > 50) {
      mvx = dx / dist; mvy = dy / dist;
    } else {
      this.strafeTimer -= dt;
      if (this.strafeTimer <= 0) { this.strafeDir *= -1; this.strafeTimer = 0.5 + Math.random() * 0.5; }
      mvx = (-dy / dist) * this.strafeDir;
      mvy = ( dx / dist) * this.strafeDir;
    }
    this.x += mvx * this.speed * dt;
    this.y += mvy * this.speed * dt;
    for (const w of walls) resolveAABB(this, w);
  }

  draw(ctx) {
    const fl = this.iframes > 0 && Math.floor(this.iframes / 2) % 2 === 0;
    ctx.fillStyle = fl ? PALETTE[15] : PALETTE[14];
    ctx.fillRect(Math.round(this.x + 2), Math.round(this.y + 4), 10, 12);
    ctx.fillStyle = fl ? PALETTE[15] : PALETTE[13];
    ctx.fillRect(Math.round(this.x + 3), Math.round(this.y),  8,  4);
    ctx.fillStyle = fl ? PALETTE[15] : PALETTE[0];
    ctx.fillRect(Math.round(this.x),      Math.round(this.y + 8), 2, 6);
    ctx.fillRect(Math.round(this.x + 12), Math.round(this.y + 8), 2, 6);
  }
}

// --- Shockwave ---
class Shockwave {
  constructor(cx, cy) {

    this.timer = 0.3; this._hit = false; this.alive = true;
  }
  update(dt) {
    this.timer -= dt;
    if (!this._hit && overlaps(this, player)) { player.takeDamage(1); this._hit = true; }
    if (this.timer <= 0) this.alive = false;
  }
  draw(ctx) {
    ctx.globalAlpha = Math.max(0, this.timer / 0.3);

// --- SweepBeam ---
// Telegraphs 1s (red flashing line) then fires instant beam across full width.

class SweepBeam {
  constructor(y) {
    this.y = y; this.x = 0; this.w = W; this.h = 6;
    this.telegraphTimer = 1.0; this.active = false;
    this.beamTimer = 0.15; this._hit = false; this.alive = true;
  }
  update(dt) {
    if (!this.active) {
      this.telegraphTimer -= dt;
      if (this.telegraphTimer <= 0) this.active = true;
    } else {
      if (!this._hit && player.y + 8 > this.y - 3 && player.y < this.y + 9) {
        player.takeDamage(1); this._hit = true;
      }
      this.beamTimer -= dt;
      if (this.beamTimer <= 0) this.alive = false;
    }
  }
  draw(ctx) {
    if (!this.active) {
      ctx.globalAlpha = 0.3 + Math.sin(Date.now() / 80) * 0.2;
      ctx.fillStyle   = PALETTE[10];
      ctx.fillRect(0, Math.round(this.y) - 1, W, 3);
      ctx.globalAlpha = 1;
    } else {
      ctx.globalAlpha = Math.max(0, this.beamTimer / 0.15);
      ctx.fillStyle   = PALETTE[12];
      ctx.fillRect(0, Math.round(this.y) - 2, W, 10);
      ctx.fillStyle   = PALETTE[15];
      ctx.fillRect(0, Math.round(this.y) + 1, W, 2);
      ctx.globalAlpha = 1;
    }
  }
}

// --- PulsingPillar ---
// Cycles grey → yellow telegraph → orange AoE damage every 2s.

class PulsingPillar {
  constructor(x, y) {
    this.x = x; this.y = y; this.w = 16; this.h = 16;
    this.cycleTimer = Math.random() * 2; // stagger instances
    this._prevDangerous = false; this.alive = true;
  }
  update(dt) {
    this.cycleTimer += dt;
    const phase = this.cycleTimer % 2;
    const dangerous = phase > 1.7;
    if (dangerous && !this._prevDangerous && overlaps(this, player)) player.takeDamage(1);
    this._prevDangerous = dangerous;
  }
  draw(ctx) {
    const phase = this.cycleTimer % 2;
    const dangerous = phase > 1.7;
    ctx.fillStyle = dangerous ? PALETTE[11] : PALETTE[4];
    ctx.fillRect(Math.round(this.x), Math.round(this.y), this.w, this.h);
    if (!dangerous && phase > 1.4) {
      ctx.globalAlpha = (phase - 1.4) / 0.3 * 0.5;
      ctx.fillStyle   = PALETTE[12];
      ctx.fillRect(Math.round(this.x), Math.round(this.y), this.w, this.h);
      ctx.globalAlpha = 1;
    }
  }
}

// --- CoreGuardian (Boss) ---
// Phase 1 (Armored): 20 HP. Lateral pace + stomp every 3s. 4 limbs cycle armored/exposed.
//   Hit exposed limb 3× to break it. All 4 broken → phase 2.
// Phase 2 (Enraged): 15 HP. 90 px/s. Sweep beam every 4s. Summons 2 Stalkers at ≤5 HP.

class CoreGuardian extends Enemy {
  constructor(x, y) {
    super(x, y, 48, 48);
    this.hp = 20; this.maxHp = 20;
    this.phase = 1; this.speed = 40; this.dir = 1;
    this.limbs = [
      { dx: 0,   dy: -24, armored: true, hp: 3, broken: false, timer: 0   },
      { dx: 0,   dy:  30, armored: true, hp: 3, broken: false, timer: 0.5 },
      { dx: -24, dy:   4, armored: true, hp: 3, broken: false, timer: 1.0 },
      { dx:  28, dy:   4, armored: true, hp: 3, broken: false, timer: 1.5 }
    ];
    this.stompTimer     = 3;
    this.stompTelegraph = 0;
    this.sweepTimer     = 4;
    this._stalkerSpawned = false;
  }

  processLimbHit(bullet) {
    const bcx = this.x + 24, bcy = this.y + 24;
    for (const l of this.limbs) {
      if (l.broken || l.armored) continue;
      const lhb = { x: bcx + l.dx - 5, y: bcy + l.dy - 5, w: 10, h: 10 };
      if (overlaps(bullet, lhb)) {
        l.hp--;
        if (l.hp <= 0) { l.broken = true; Sfx.enemyDie(); }
        else Sfx.enemyHit();
        return true;
      }
    }
    return false;
  }

  takeDamage(dmg) {
    if (this.phase === 1) return;
    if (this.iframes > 0) return;
    this.hp -= dmg; this.iframes = 8;
    if (this.hp <= 0) { this.alive = false; Sfx.enemyDie(); }
    else Sfx.enemyHit();
  }

  update(dt, walls, player, bullets) {
    this.iframes = Math.max(0, this.iframes - 1);

    if (this.phase === 1) {
      for (const l of this.limbs) {
        if (!l.broken) { l.timer += dt; l.armored = l.timer % 2 < 1; }
      }
      // Lateral pace — bounce on wall contact
      const prevX = this.x;
      this.x += this.dir * this.speed * dt;
      for (const w of walls) resolveAABB(this, w);
      if (Math.abs(this.x - prevX) < this.speed * dt * 0.5) this.dir *= -1;
      // Stomp
      this.stompTimer -= dt;
      if (this.stompTimer <= 0.5) this.stompTelegraph = Math.min(0.5, this.stompTelegraph + dt);
      if (this.stompTimer <= 0) {
        shockwaves.push(new Shockwave(this.x + 24, this.y + 44));
        this.stompTimer = 3; this.stompTelegraph = 0;
      }
      if (this.limbs.every(l => l.broken)) {
        this.phase = 2; this.hp = 15; this.maxHp = 15; this.speed = 90; this.sweepTimer = 4;
        Sfx.bossTransition();
      }
    } else {
      const cx = this.x + 24, cy = this.y + 24;
      const px = player.x + 4, py = player.y + 4;
      const dist = Math.hypot(cx - px, cy - py) || 1;
      const s = this.speed * dt / dist;
      this.x += (px - cx) * s; this.y += (py - cy) * s;
      for (const w of walls) resolveAABB(this, w);
      this.sweepTimer -= dt;
      if (this.sweepTimer <= 0) { sweepBeams.push(new SweepBeam(this.y + 24)); this.sweepTimer = 4; }
      if (this.hp <= 5 && !this._stalkerSpawned) {
        enemies.push(new Stalker(this.x + 4,  H / 2));
        enemies.push(new Stalker(this.x + 32, H / 2));
        this._stalkerSpawned = true;
      }
    }
  }

  draw(ctx) {
    const rx  = Math.round(this.x);
    const yOff = this.stompTelegraph > 0.1 ? -4 : 0;
    const ry  = Math.round(this.y) + yOff;
    const fl  = this.iframes > 0 && Math.floor(this.iframes / 2) % 2 === 0;
    ctx.fillStyle = fl ? PALETTE[15] : PALETTE[4];
    ctx.fillRect(rx + 4, ry + 4, 40, 40);
    ctx.fillStyle = fl ? PALETTE[15] : PALETTE[5];
    ctx.fillRect(rx + 8, ry + 8, 32, 32);
    ctx.fillStyle = fl ? PALETTE[15] : (this.phase === 2 ? PALETTE[10] : PALETTE[2]);
    ctx.fillRect(rx + 14, ry + 14, 20, 20);
    if (this.phase === 1) {
      const bcx = Math.round(this.x + 24), bcy = Math.round(this.y + 24) + yOff;
      for (const l of this.limbs) {
        if (l.broken) continue;
        ctx.fillStyle = l.armored ? PALETTE[12] : PALETTE[10];
        ctx.fillRect(bcx + l.dx - 5, bcy + l.dy - 5, 10, 10);
      }
    }
  }
}

// --- Pursuer ---
// 24×24, re-skinned Vessel. Invulnerable. Matches player base speed.
// Appears in act 4 r07–r08. Can't be killed — player must outrun it.

class Pursuer extends Enemy {
  constructor(x, y) {
